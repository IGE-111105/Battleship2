# 92500 - Nuno Venâncio

name: Qodana Code Quality

on:
push:
branches: [ main ]
pull_request:

jobs:
qodana:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v3

  - name: Run Qodana
    uses: JetBrains/qodana-action@v2023.2
    with:
      args: >
        --property qodana.thresholds.class.wmc=20
        --property qodana.thresholds.class.cbo=10
        --property qodana.thresholds.class.rfc=20

  - name: Upload Qodana results
    uses: actions/upload-artifact@v3
    with:
      name: qodana-report
      path: qodana/report
```
